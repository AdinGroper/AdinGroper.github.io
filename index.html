<!DOCTYPE html>
<html lang="en-US">

<head>
    <title>Adin's Adventure Log</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Adin Groper">

    <link rel="preload" as="image" href="/Media/homepage-background.jpg">
    <link rel="stylesheet" href="/main.css">
    <link rel="icon" href="/Media/logo.svg?v=2" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">
    <script src="/components/nav.js" defer></script>

    <style>
        body { margin: 0; padding: 0; background: #f2f7f4; overflow: hidden; height: 100dvh; }

        /* ── Hero wrapper ─────────────────────────────────────────── */
        .hero {
            position: relative;
            height: 100dvh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* ── Photo ────────────────────────────────────────────────── */
        .hero-background {
            position: absolute;
            inset: 0;
            z-index: 0;
            background: none;
            height: 100%;
            width: 100%;
        }
        .hero-background img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ── Dark overlay (replaces blur) ─────────────────────────── */
        .hero-background::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(4, 9, 18, 0.42);
            backdrop-filter: none;
            z-index: 1;
        }

        /* ── Bottom fade into page background ─────────────────────── */
        .hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 20%;
            background: linear-gradient(to bottom, transparent, #f2f7f4);
            z-index: 2;
            pointer-events: none;
        }

        /* ── Text content ─────────────────────────────────────────── */
        .hero-content {
            position: relative;
            z-index: 3;
            text-align: center;
            padding: 0 1.5em;
            color: #e8f4ee;
            font-weight: 300;
            text-shadow: none;
            background: none;
            margin: 0;
        }

        /* WELCOME */
        #intro1 {
            font-family: 'Raleway', sans-serif;
            font-weight: 300;
            font-size: clamp(3rem, 13vw, 9rem);
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: #e8f4ee;
            text-shadow:
                0 0 40px rgba(140, 210, 170, 0.45),
                0 0 90px rgba(100, 170, 130, 0.2),
                0 4px 18px rgba(0, 0, 0, 0.6);
            margin: 0;
            line-height: 1;
            white-space: nowrap;
            position: static;
            top: auto;
        }

        /* to */
        #intro2 {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-weight: 400;
            font-size: clamp(1.4rem, 3.5vw, 2.8rem);
            color: #c8d8cc;
            letter-spacing: 0.05em;
            text-shadow: 0 3px 14px rgba(0, 0, 0, 0.55);
            margin: 0.2em 0 0.2em;
            line-height: 1;
            position: static;
            top: auto;
        }

        /* ADIN'S ADVENTURE LOG */
        #intro3 {
            font-family: 'Raleway', sans-serif;
            font-weight: 300;
            font-weight: 400;
            font-size: clamp(1.1rem, 3.8vw, 3.2rem);
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: #e8f4ee;
            text-shadow:
                0 0 30px rgba(140, 210, 170, 0.3),
                0 4px 18px rgba(0, 0, 0, 0.6);
            margin: 0 0 0.75em;
            line-height: 1;
            white-space: nowrap;
            position: static;
            top: auto;
        }

        /* Gold rule */
        .hero-divider {
            width: min(260px, 55%);
            height: 1px;
            background: #c8a870;
            margin: 0 auto 0.85em;
        }

        /* Tagline */
        .hero-tagline {
            font-family: 'Raleway', sans-serif;
            font-weight: 300;
            font-size: clamp(0.55rem, 1.4vw, 0.8rem);
            letter-spacing: 0.45em;
            text-transform: uppercase;
            color: #c8a870;
            margin: 0;
        }

        /* ── Tablet ───────────────────────────────────────────────── */
        @media (min-width: 481px) and (max-width: 1199px) {
            #intro1 { letter-spacing: 0.15em; }
            #intro3 { letter-spacing: 0.12em; }
        }

        /* ── Mobile ───────────────────────────────────────────────── */
        @media (max-width: 480px) {
            #intro1 {
                font-size: clamp(3.2rem, 11vw, 3.8rem);
                letter-spacing: 0.1em;
            }
            #intro2 {
                font-size: clamp(1.5rem, 5vw, 1.8rem);
            }
            #intro3 {
                font-size: clamp(1.3rem, 5vw, 1.6rem);
                letter-spacing: 0.1em;
                white-space: normal;
            }
            .hero-tagline {
                font-size: 0.6rem;
                letter-spacing: 0.3em;
            }
            .hero-divider { width: min(200px, 65%); }
        }

    </style>
</head>

<body>
    <site-nav></site-nav>

    <main class="hero">
        <div class="hero-content">
            <h1 id="intro1">WELCOME</h1>
            <h1 id="intro2">to</h1>
            <h1 id="intro3">ADIN'S ADVENTURE LOG</h1>
            <div class="hero-divider"></div>
            <p class="hero-tagline">Explore &nbsp;·&nbsp; Embrace &nbsp;·&nbsp; Enjoy</p>
        </div>
        <div class="hero-background">
            <img src="/Media/homepage-background.jpg" alt="Homepage Background" loading="eager">
        </div>
    </main>


</body>
</html>
