<!DOCTYPE html>
<!--
    STANDALONE COUNTRY PAGE TEMPLATE
    Use this when a country was visited as a single trip with no separate city sub-pages.
    Example pages using this template: andorra.html, austria.html, czechia.html, hungary.html,
                                       luxembourg.html, malta.html, singapore.html, vaticancity.html

    SETUP CHECKLIST:
    1. Replace COUNTRY_NAME with the country/place name (e.g. "Greece")
    2. Replace MONTH YEAR with the visit date (e.g. "September 2024")
    3. Fill in the intro paragraph (parchment card)
    4. Add your content blocks — see the CONTENT BLOCKS section below
    5. Save as MyTravels/[country].html (e.g. MyTravels/greece.html)
    6. Add a stamp for this country on MyTravels/destinations.html

    CONTENT BLOCK TYPES (copy/paste as needed):

    — Full-width photo:
        <div class="city-photo">
            <img src="/Media/COUNTRY_NAME/filename.jpg" alt="Description">
        </div>

    — Side-by-side photos (2 or 3 images):
        <div class="city-combo">
            <img src="/Media/COUNTRY_NAME/filename.jpg" alt="Description">
            <img src="/Media/COUNTRY_NAME/filename.jpg" alt="Description">
        </div>

    — Photo + text side by side:
        <div class="city-combo">
            <img src="/Media/COUNTRY_NAME/filename.jpg" alt="Description">
            <p>Your text here.</p>
        </div>

    — Text only:
        <div class="city-body">
            <p>Your paragraph here.</p>
            <p>Another paragraph if needed.</p>
        </div>
-->
<html lang="en-US">

<head>
    <title>Adin's Adventure Log | COUNTRY_NAME</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Adin Groper">

    <link rel="stylesheet" href="/main.css">
    <link rel="stylesheet" href="/theme.css">
    <link rel="icon" href="/Media/airplane-logo.jpg">
    <script src="/components/nav.js" defer></script>

    <style>
        .dark-section { padding: 10em 0 0; }
        .light-section { padding: 3em 2em 5em; }
        .city-container { max-width: 780px; margin: 0 auto; }
        .city-header { text-align: center; margin-bottom: 2.5em; }
        .heading-country { font-size: clamp(2rem, 5.5vw, 4rem); letter-spacing: 0.25em; }
        .city-intro { padding: 2em 2.5em; margin: 0 auto 2.5em; }
        @media (min-width: 1024px) { .city-container { max-width: 960px; } }
    </style>
</head>

<body>
    <site-nav></site-nav>

    <main>
        <div class="dark-section">
            <div id="star-field"></div>
        </div>

        <div class="light-section">
            <div class="city-container">

                <div class="city-header">
                    <a href="/MyTravels/destinations.html" class="breadcrumb">← My Travels</a>
                    <h1 class="heading-country">COUNTRY_NAME</h1>
                    <p class="heading-date">MONTH YEAR</p>
                </div>

                <!-- Intro paragraph: 1-3 sentences about the country/place -->
                <div class="parchment-card city-intro">
                    <p>Write a brief description of the country here. Where is it located? What is it known for?</p>
                </div>

                <!-- ═══════════════════════════════════════════════════
                     CONTENT BLOCKS — add your text and photos below.
                     See the comment at the top of this file for the
                     available block types and how to use them.
                     ═══════════════════════════════════════════════════ -->

                <div class="city-body">
                    <p>Your story begins here...</p>
                </div>

                <!-- Add more content blocks here -->

                <div class="back-to-top">
                    <a href="#" class="breadcrumb">↑ Back to Top</a>
                </div>

            </div>
        </div>
    </main>

    <footer><div class="footer"></div></footer>

    <script>
    window.addEventListener('load', function () {
        const field = document.getElementById('star-field');
        for (let i = 0; i < 120; i++) {
            const s         = document.createElement('div');
            s.className     = 'star';
            s.style.left    = (Math.random() * 100) + '%';
            s.style.top     = (Math.random() * 100) + '%';
            const size      = Math.random() < 0.8 ? 1 : (Math.random() < 0.6 ? 2 : 3);
            s.style.width   = s.style.height = size + 'px';
            s.style.opacity = (0.2 + Math.random() * 0.75).toFixed(2);
            const r = Math.random();
            if      (r < 0.07) s.style.background = '#ffeebb';
            else if (r < 0.14) s.style.background = '#cce0ff';
            field.appendChild(s);
        }
    });
    </script>
</body>
</html>
