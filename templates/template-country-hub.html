<!DOCTYPE html>
<!--
    COUNTRY HUB PAGE TEMPLATE
    Use this when a country has multiple cities, each with their own page.
    Example pages using this template: france.html, canada.html, colombia.html

    SETUP CHECKLIST:
    1. Replace COUNTRY_NAME with the country name (e.g. "Italy")
    2. Replace COUNTRY_NAME_LOWERCASE with the filename-safe version (e.g. "italy")
    3. Fill in the intro paragraph about the country
    4. Add year groups and city stamps (see comments below)
    5. Save as MyTravels/[country].html (e.g. MyTravels/italy.html)
    6. Add a stamp for this country on MyTravels/destinations.html
-->
<html lang="en-US">

<head>
    <title>Adin's Adventure Log | COUNTRY_NAME</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Adin Groper">

    <link rel="stylesheet" href="/main.css">
    <link rel="stylesheet" href="/theme.css">
    <link rel="icon" href="/Media/logo.svg?v=2" type="image/svg+xml">
    <script src="/components/nav.js" defer></script>

    <style>
        .dark-section { padding: 10em 0 0; }
        .light-section { padding: 3em 2em 5em; text-align: center; }
        .country-container { max-width: 780px; margin: 0 auto; }
        .heading-country { font-size: clamp(2.4rem, 6vw, 4.5rem); letter-spacing: 0.3em; margin: 0 0 1.2em; }
        .country-intro { padding: 2em 2.5em; margin: 0 auto 3em; }
        @media (min-width: 1024px) { .country-container { max-width: 960px; } }
    </style>
</head>

<body>
    <site-nav></site-nav>

    <main>
        <div class="dark-section">
            <div id="star-field"></div>
        </div>

        <div class="light-section">
            <div class="country-container">

                <a href="/MyTravels/destinations.html" class="breadcrumb">← My Travels</a>
                <h1 class="heading-country">COUNTRY_NAME</h1>

                <!-- Intro paragraph: 1-3 sentences about the country -->
                <div class="parchment-card country-intro">
                    <p>Write a brief description of the country here. Where is it located? What is it known for?</p>
                </div>

                <!-- ═══════════════════════════════════════════════════
                     CITY STAMPS — organized by year (newest at top)
                     To add a new year: copy the year-group block below
                     To add a city stamp: copy one <a> line inside destination-list
                     City page filename format: COUNTRY_NAME_LOWERCASE-cityname.html
                     ═══════════════════════════════════════════════════ -->

                <!-- To add a new year: copy this whole block -->
                <div class="year-group">
                    <h3 class="year-heading">YEAR</h3>
                    <div class="destination-list">
                        <!-- To add a city: copy this line -->
                        <a href="/MyTravels/COUNTRY_NAME_LOWERCASE-cityname.html">City Name</a>
                    </div>
                </div>
                <!-- end year block -->

            </div>
        </div>
    </main>

    <footer><div class="footer"></div></footer>

    <script>
    window.addEventListener('load', function () {
        const field = document.getElementById('star-field');
        for (let i = 0; i < 120; i++) {
            const s         = document.createElement('div');
            s.className     = 'star';
            s.style.left    = (Math.random() * 100) + '%';
            s.style.top     = (Math.random() * 100) + '%';
            const size      = Math.random() < 0.8 ? 1 : (Math.random() < 0.6 ? 2 : 3);
            s.style.width   = s.style.height = size + 'px';
            s.style.opacity = (0.2 + Math.random() * 0.75).toFixed(2);
            const r = Math.random();
            if      (r < 0.07) s.style.background = '#ffeebb';
            else if (r < 0.14) s.style.background = '#cce0ff';
            field.appendChild(s);
        }
    });
    </script>
</body>
</html>
