<svg width="220" height="220" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Oleo+Script&display=swap');
    ]]></style>
    <path id="topArc" d="M 48,110 A 62,62 0 0,1 172,110"/>
    <path id="botArc" d="M 35,110 A 75,75 0 0,0 185,110"/>
    <clipPath id="innerClip"><circle cx="110" cy="110" r="84"/></clipPath>
  </defs>

  <!-- Outer dark ring -->
  <circle cx="110" cy="110" r="105" fill="#3A2818"/>
  <!-- Gold ring stroke -->
  <circle cx="110" cy="110" r="98" fill="none" stroke="#C4A882" stroke-width="1.2"/>
  <!-- Cream band -->
  <circle cx="110" cy="110" r="93" fill="#E8D8BC"/>
  <!-- Inner dark face -->
  <circle cx="110" cy="110" r="86" fill="#3A2818"/>
  <!-- Dashed inner border -->
  <circle cx="110" cy="110" r="80" fill="none" stroke="#B8986A" stroke-width="0.8" stroke-dasharray="2,4"/>

  <!-- Map grid clipped to inner circle -->
  <g clip-path="url(#innerClip)">
    <!-- Horizontal lines -->
    <line x1="26" y1="90"  x2="194" y2="90"  stroke="#5A4030" stroke-width="0.8"/>
    <line x1="26" y1="106" x2="194" y2="106" stroke="#5A4030" stroke-width="0.8"/>
    <line x1="26" y1="122" x2="194" y2="122" stroke="#5A4030" stroke-width="0.8"/>
    <line x1="26" y1="138" x2="194" y2="138" stroke="#5A4030" stroke-width="0.8"/>
    <line x1="26" y1="154" x2="194" y2="154" stroke="#5A4030" stroke-width="0.8"/>
    <!-- Vertical lines -->
    <line x1="62"  y1="26" x2="62"  y2="194" stroke="#5A4030" stroke-width="0.8"/>
    <line x1="80"  y1="26" x2="80"  y2="194" stroke="#5A4030" stroke-width="0.8"/>
    <line x1="98"  y1="26" x2="98"  y2="194" stroke="#5A4030" stroke-width="0.8"/>
    <line x1="116" y1="26" x2="116" y2="194" stroke="#5A4030" stroke-width="0.8"/>
    <line x1="134" y1="26" x2="134" y2="194" stroke="#5A4030" stroke-width="0.8"/>
    <line x1="152" y1="26" x2="152" y2="194" stroke="#5A4030" stroke-width="0.8"/>
    <line x1="170" y1="26" x2="170" y2="194" stroke="#5A4030" stroke-width="0.8"/>

    <!-- Mountain range — left faces lit, right faces shadowed -->
    <polygon points="46,139 78,94 78,139"     fill="#836646"/>
    <polygon points="78,94 112,139 78,139"    fill="#937656"/>
    <polygon points="72,143 110,76 110,143"   fill="#634838"/>
    <polygon points="110,76 150,143 110,143"  fill="#735848"/>
    <polygon points="110,147 142,95 142,147"  fill="#836646"/>
    <polygon points="142,95 176,147 142,147"  fill="#937656"/>
    <!-- Snow caps -->
    <polygon points="75,100 78,94 81,100"     fill="#E8D8BC"/>
    <polygon points="106,83 110,76 114,83"    fill="#E8D8BC"/>
    <polygon points="139,101 142,95 145,101"  fill="#E8D8BC"/>

    <!-- Winding dotted route -->
    <path d="M 36,156 Q 44,145 54,141 Q 68,134 70,122 Q 72,108 86,102 Q 100,96 110,104 Q 120,112 132,105 Q 144,98 154,105 Q 163,111 172,105 Q 168,100 174,104"
          fill="none" stroke="#C4A882" stroke-width="1.5" stroke-dasharray="3.5,3"/>
    <!-- Start dot -->
    <circle cx="36" cy="156" r="3.5" fill="#C4A882"/>
    <!-- End pin -->
    <circle cx="174" cy="104" r="5.5" fill="#C4A882"/>
    <circle cx="174" cy="104" r="2.5" fill="#3A2818"/>
  </g>

  <!-- Curved title text — Oleo Script along top arc -->
  <text font-family="'Oleo Script', Georgia, 'Times New Roman', serif" font-size="14" fill="#E8D8BC" letter-spacing="1">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">Adin's Adventure Log</textPath>
  </text>

  <!-- Est. 2021 along bottom arc — positioned in cream band above dashed line -->
  <text font-family="Georgia,'Times New Roman',serif" font-size="7.5" fill="#C4A882" letter-spacing="3">
    <textPath href="#botArc" startOffset="50%" text-anchor="middle">✦ EST. 2021 ✦</textPath>
  </text>

  <!-- Cardinal tick marks -->
  <line x1="110" y1="5"   x2="110" y2="13"  stroke="#C4A882" stroke-width="1.2"/>
  <line x1="110" y1="207" x2="110" y2="215" stroke="#C4A882" stroke-width="1.2"/>
  <line x1="5"   y1="110" x2="13"  y2="110" stroke="#C4A882" stroke-width="1.2"/>
  <line x1="207" y1="110" x2="215" y2="110" stroke="#C4A882" stroke-width="1.2"/>
</svg>
