    <style>
        /* ── Dark section ────────────────────────────────────────── */
        .dark-section { padding: 4.5em 2em 4em; }
        .heading-dark {
            position: relative;
            z-index: 1;
            margin: 0 0 1.75em;
            font-family: 'Raleway', sans-serif;
            font-weight: 300;
            font-size: 1.6rem;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: #e8f4ee;
            text-shadow:
                0 0 30px rgba(140, 210, 170, 0.35),
                0 0 70px rgba(100, 170, 130, 0.15);
        }
        #chartdiv { position: relative; z-index: 1; }

        /* ── Light section ───────────────────────────────────────── */
        .light-section { padding: 3em 2em 4em; text-align: center; }
        .heading-light { margin-bottom: 2em; }

        @media (min-width: 1024px) {
            .destination-list { padding: 0 3em !important; }
            .heading-dark { font-size: 2.2rem; }
        }

        /* ── Globe tooltip ───────────────────────────────────────── */
        #globe-tooltip {
            position: fixed;
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            padding: 4px 12px;
            border-radius: 4px;
            font-family: 'Oswald', Arial;
            font-size: 0.9rem;
            pointer-events: none;
            display: none;
            z-index: 100;
        }

        /* ── Responsive globe ────────────────────────────────────── */
        #chartdiv { height: unset !important; aspect-ratio: 1; }
        #chartdiv svg { display: block; width: 100%; height: 100%; overflow: visible; }
        @media (min-width: 1024px) {
            #chartdiv { width: min(60%, 500px) !important; margin-left: auto; margin-right: auto; }
        }

        /* ── Continent groups ────────────────────────────────────── */
        .continent-group { max-width: 900px; }
    </style>
</head>

        const projection = d3.geoOrthographic()
            .scale(radius)
            .translate([cx, cy])
            .clipAngle(90)
            .rotate([0, -20]);

        const pathGen = d3.geoPath().projection(projection);

        // Mutable globe state
        let rotX = 0;
        let rotY = -20;
        let isIntro         = true;   // true while the region tour is running
        let isDragging      = false;
        let spinPausedUntil = 0;      // timestamp — spin waits until this passes

        let introActive               = true;     // globe starts fully dark; cleared when tour ends

        let zoomResetTimeout          = null;
        let zoomAnimCancelled         = false;
        let dragActive                = false;
        let hoveredCountryId          = null;
        let lastPinchDist             = null;

        const inGlobe = (x, y) => (x - cx) ** 2 + (y - cy) ** 2 <= radius * radius;

        // Convert clientX/clientY (screen pixels) to SVG logical coordinates
        function toSVGCoords(clientX, clientY) {
            const rect = svg.node().getBoundingClientRect();
            return [
                (clientX - rect.left) * (LOGICAL / rect.width),
                (clientY - rect.top)  * (LOGICAL / rect.height),
            ];
        }

                    136,  // Cayman Islands    (Caribbean, west)

                    620,  // Portugal    (far west, south)
                    724,  // Spain
                    20,   // Andorra     (between Spain & France)
                    250,  // France
                    442,  // Luxembourg
                    276,  // Germany
                    756,  // Switzerland
                    380,  // Italy
                    336,  // Vatican City (within Italy)
                    40,   // Austria
                    203,  // Czechia
                    348,  // Hungary     (east)
                    470,  // Malta       (far south)
                ])
            },
            {
                name: 'Africa',
                rotX: -18,    rotY:  -1.6,  zoom: 1.2,
                countries: new Set([504]) // Morocco
            },
            {
                name: 'Asia',
                rotX: -83.8,  rotY: -33.3,  zoom: 1.2,
                countries: new Set([
                    376,  // Israel    (westernmost)
                    156,  // China
                    702,  // Singapore (south, ~same longitude as China)
                    392,  // Japan     (easternmost)
                ])
            },
            {
                name: 'Oceania',
                rotX: -134.3, rotY:  25.7,  zoom: 1.3,
                countries: new Set() // no visited countries yet
            }
        ];

        const svg = d3.select('#chartdiv')
            .append('svg')
            .attr('viewBox', `0 0 ${LOGICAL} ${LOGICAL}`)
            .attr('width', '100%')
            .attr('height', '100%')
            .style('cursor', 'default');

        const defs = svg.append('defs');

        defs.append('clipPath').attr('id', 'globe-clip')
            .append('circle').attr('cx', cx).attr('cy', cy).attr('r', radius);

        const shadow = defs.append('filter').attr('id', 'globe-shadow');
        shadow.append('feDropShadow')
            .attr('dx', 4).attr('dy', 6)
            .attr('stdDeviation', 8)
            .attr('flood-color', '#000')
            .attr('flood-opacity', 0.5);

        // Ocean
        svg.append('circle')
            .attr('cx', cx).attr('cy', cy).attr('r', radius)
            .attr('fill', '#152738')
            .attr('filter', 'url(#globe-shadow)');

        const mapGroup = svg.append('g').attr('clip-path', 'url(#globe-clip)');

        // Load world topology from CDN
        const world = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');

        const borders   = topojson.mesh(world, world.objects.countries, (a, b) => a !== b);

        const HOME = 840; // United States

        function countryFill(id) {
            if (id === HOME) return '#5ba8c8';
            if (introActive) {
                // Globe starts fully dark; countries light up only once revealed
                return globallyRevealedCountries.has(id) ? '#90ee60' : '#243b23';
            }
            return visited.has(id) ? '#4a9e3f' : '#243b23';
        }

        mapGroup.selectAll('path.country')
            .data(countries.features)
            .enter()
            .append('path')
            .attr('class', 'country')
            .attr('d', pathGen)
            .attr('fill', d => countryFill(+d.id))
            .on('mouseover', function (event, d) {
                const id   = +d.id;
                hoveredCountryId = id;
                const name = countryNames[id];
                if (id === HOME)          d3.select(this).attr('fill', '#7ec8e3');
                else if (visited.has(id)) d3.select(this).attr('fill', '#6fcf58');
                if (name) {
                    tooltip.textContent = name;
                    tooltip.style.display = 'block';
                }
            })
            .on('mousemove', function (event) {
                tooltip.style.left = (event.clientX + 14) + 'px';
                tooltip.style.top  = (event.clientY - 30) + 'px';
            })
            .on('mouseout', function (event, d) {
                hoveredCountryId = null;
                d3.select(this).attr('fill', countryFill(+d.id));
                tooltip.style.display = 'none';
            })
            .on('touchstart', function (event, d) {
                const id   = +d.id;
                const name = countryNames[id];
                if (!name) return;
                const touch = event.touches[0];
                tooltip.textContent = name;
                tooltip.style.left  = (touch.clientX + 14) + 'px';
                tooltip.style.top   = (touch.clientY - 30) + 'px';

        function updateDots() {
            dots.each(function (d) {
                const pos      = projection(d.coords);
                const visible  = d3.geoDistance(d.coords, [-rotX, -rotY]) < Math.PI / 2;
                const revealed   = d.id !== null && globallyRevealedCountries.has(d.id);
                const isVisited  = d.id !== null && visited.has(d.id);

                // During intro: hide until revealed; after intro: visited only
                const show = introActive ? revealed : isVisited;
                // Pulse slightly brighter while its region is the active one
                const lit  = revealed && d.region === currentRegionName;

                if (pos && visible && show) {
                    d3.select(this)
                        .attr('cx', pos[0])
                        .attr('cy', pos[1])
                        .attr('r',    lit ? 7 : 5)
                        .attr('fill', lit ? '#c8ff90' : (isVisited ? '#6fcf58' : '#4a7a4a'))
                        .style('display', null);
                } else {
                    d3.select(this).style('display', 'none');
                }
            });

        const regionLabel = svg.append('text')
            .attr('x', cx)
            .attr('y', cy + radius - 18)
            .attr('text-anchor', 'middle')
            .attr('fill', 'rgba(255,255,255,0.9)')
            .attr('font-family', 'Oswald, Arial')
            .attr('font-size', '1.1rem')
            .attr('letter-spacing', '0.2em')
            .style('pointer-events', 'none')
            .style('display', 'none');

        // Globe outline ring
        svg.append('circle')
            .attr('cx', cx).attr('cy', cy).attr('r', radius)
            .attr('fill', 'none')
            .attr('stroke', '#0d1a4a')
            .attr('stroke-width', 1.5);

        function redraw() {
            mapGroup.selectAll('path.country').attr('d', pathGen);
            // Skip fill for hovered country and any currently fading in
            mapGroup.selectAll('path.country')
                .filter(d => +d.id !== hoveredCountryId && !revealingIds.has(+d.id))
                .attr('fill', d => countryFill(+d.id));
            mapGroup.select('path.borders').attr('d', pathGen);
            updateDots();
        }

        // Smoothly animate rotation and scale, returns a Promise.
        // Resolves early (cancelled) if isIntro becomes false mid-flight.
        function animateTo(targetRotX, targetRotY, targetScale, duration) {
            return new Promise(resolve => {
                const startRotX  = rotX;
                const startRotY  = rotY;
                const startScale = projection.scale();
                // Always take the shorter arc around the globe
                const dX = ((targetRotX - startRotX) % 360 + 540) % 360 - 180;
                const dY = targetRotY - startRotY;
                const t0 = performance.now();

                function tick() {
                    if (!isIntro) { resolve(); return; } // cancelled by user drag
                    const t = Math.min((performance.now() - t0) / duration, 1);
                    const e = d3.easeCubicInOut(t);
                    rotX = startRotX + dX * e;
                    rotY = startRotY + dY * e;
                    projection.rotate([rotX, rotY]).scale(startScale + (targetScale - startScale) * e);
                    redraw();
                    if (t < 1) {
                        requestAnimationFrame(tick);
                    } else {
                        rotX = startRotX + dX;
                        rotY = targetRotY;
                        resolve();
                    }
                }
                requestAnimationFrame(tick);
            });
        }

        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

        // Smoothly animate back to the default scale after the user stops scrolling
        function startZoomReset() {
            zoomAnimCancelled = false;
            const startScale = projection.scale();
            const startRotY  = rotY;
            const targetRotY = -20;
            if (startScale <= radius && Math.abs(startRotY - targetRotY) < 0.01) return;
            const t0       = performance.now();
            const duration = 800;
            // Use d3.timer so this runs in the same batch as the spin timer each frame
            const resetTimer = d3.timer(function () {
                if (zoomAnimCancelled) { resetTimer.stop(); return; }
                const t = Math.min((performance.now() - t0) / duration, 1);
                const e = d3.easeCubicInOut(t);
                projection.scale(Math.max(radius, startScale + (radius - startScale) * e));
                rotY = startRotY + (targetRotY - startRotY) * e;
                projection.rotate([rotX, rotY]);
                redraw();
                if (t >= 1) resetTimer.stop();
            });
        }

        function scheduleZoomReset() {
            clearTimeout(zoomResetTimeout);
            zoomAnimCancelled = true; // cancel any in-progress reset
            zoomResetTimeout = setTimeout(() => {
                if (!isDragging && !isIntro) startZoomReset();
            }, 3000);
        }

        const revealingIds = new Set();

        // Reveals the visited countries in a region one at a time, leaving them lit permanently
        async function revealRegion(region) {
            currentRegionName = region.name;
            regionLabel.text(region.name.toUpperCase()).style('display', null);
            mapGroup.selectAll('path.country').attr('d', pathGen);
            mapGroup.select('path.borders').attr('d', pathGen);
            updateDots();

            for (const id of region.countries) {
                if (!isIntro) return;
                globallyRevealedCountries.add(id);
                revealingIds.add(id);

                // Fade the country in rather than snapping it
                mapGroup.selectAll('path.country')
                    .filter(d => +d.id === id)
                    .transition().duration(400).ease(d3.easeCubicOut)
                    .attr('fill', '#90ee60')
                    .on('end', () => revealingIds.delete(id));

                updateDots();
                await sleep(180);
            }

            await sleep(700); // pause with all countries lit before moving on

            currentRegionName = null;
            regionLabel.style('display', 'none');
            redraw();
        }

        // Intro region tour
        async function runIntro() {
            for (const region of regions) {
                await animateTo(region.rotX, region.rotY, radius * region.zoom, 1400);
                if (!isIntro) break;
                await revealRegion(region);
                if (!isIntro) break;
            }

            if (isIntro) {
                // Tour finished naturally — glide back to default view
                await animateTo(0, -20, radius, 1200);
            }

            // Clean up any partial state left by a cancelled intro
            currentRegionName = null;
            regionLabel.style('display', 'none');
            projection.scale(radius);
            introActive = false;
            isIntro     = false;
            redraw();
        }

        // Auto-rotation timer — paused during intro and briefly after drag/click
        const SPEED = 0.008;
        d3.timer(function (elapsed) {
            const dt = elapsed - prevElapsed;
            prevElapsed = elapsed;
            if (!isIntro && !isDragging && performance.now() > spinPausedUntil && projection.scale() <= radius) {
                rotX += dt * SPEED;
                projection.rotate([rotX, rotY]);
                redraw();
            }
        });

        // Cursor: grab only when hovering inside the globe circle
        svg.on('mousemove.cursor', function (event) {
            const [mx, my] = d3.pointer(event);
            svg.style('cursor', isDragging ? 'grabbing' : (inGlobe(mx, my) ? 'grab' : 'default'));
        });

        // Drag to rotate — also cancels the intro tour if it's still running
        svg.call(d3.drag()
            .on('start', function (event) {
                if (!inGlobe(event.x, event.y)) { dragActive = false; return; }
                dragActive        = true;
                const wasIntro    = isIntro;
                isIntro           = false;
                isDragging        = true;
                introActive       = false;
                currentRegionName = null;
                regionLabel.style('display', 'none');
                zoomAnimCancelled = true;
                clearTimeout(zoomResetTimeout);
                if (wasIntro) projection.scale(radius);
                tooltip.style.display = 'none';
                svg.style('cursor', 'grabbing');
                redraw();
            })
            .on('drag', function (event) {
                if (!dragActive) return;
                const dragSensitivity = 0.4 / (projection.scale() / radius);
                rotX += event.dx * dragSensitivity;
                rotY = Math.max(-90, Math.min(90, rotY - event.dy * dragSensitivity));
                projection.rotate([rotX, rotY]);
                redraw();
            })
            .on('end', function () {
                if (!dragActive) return;
                dragActive      = false;
                isDragging      = false;
                spinPausedUntil = performance.now() + 3000;
                scheduleZoomReset();
                svg.style('cursor', 'grab');
            })
        );

        // Mouse-wheel zoom — disabled during intro tour
        svg.node().addEventListener('wheel', function (event) {
            const [lx, ly] = toSVGCoords(event.clientX, event.clientY);
            if (!inGlobe(lx, ly)) return;
            event.preventDefault();
            if (isIntro) return;
            const factor = event.deltaY < 0 ? 1.06 : 1 / 1.06;
            const newScale = Math.max(radius, Math.min(radius * 4, projection.scale() * factor));
            projection.scale(newScale);
            redraw();
            scheduleZoomReset(); // zoom resets 3 seconds after last scroll
        }, { passive: false });

        // Touch: track pinch start distance
        svg.node().addEventListener('touchstart', function (event) {
            if (event.touches.length === 2) {
                const t0 = event.touches[0], t1 = event.touches[1];
                lastPinchDist = Math.hypot(t0.clientX - t1.clientX, t0.clientY - t1.clientY);
            }
        }, { passive: true });

        // Touch: pinch-to-zoom + prevent page scroll while dragging globe
        svg.node().addEventListener('touchmove', function (event) {
            if (event.touches.length === 2 && lastPinchDist !== null) {
                event.preventDefault();
                if (!isIntro) {
                    const t0 = event.touches[0], t1 = event.touches[1];
                    const dist = Math.hypot(t0.clientX - t1.clientX, t0.clientY - t1.clientY);
                    const factor = dist / lastPinchDist;
                    lastPinchDist = dist;
                    const newScale = Math.max(radius, Math.min(radius * 4, projection.scale() * factor));
                    projection.scale(newScale);
                    redraw();
                    scheduleZoomReset();
                }
            } else if (dragActive) {
                event.preventDefault(); // prevent page scroll while single-finger dragging globe
            }
        }, { passive: false });

        // Touch: reset pinch tracking on finger lift
        svg.node().addEventListener('touchend', function () {
            lastPinchDist = null;
        }, { passive: true });

        runIntro();
    });
    </script>

    <script>
    // Star field — avoids the heading text bounding box
    window.addEventListener('load', function () {
        const field   = document.getElementById('star-field');
        const section = document.querySelector('.dark-section');
        const heading = document.querySelector('.heading-dark');

        const sr  = section.getBoundingClientRect();
        const hr  = heading.getBoundingClientRect();
        const pad = 18;

        const exL = ((hr.left   - pad - sr.left) / sr.width)  * 100;
        const exR = ((hr.right  + pad - sr.left) / sr.width)  * 100;
        const exT = ((hr.top    - pad - sr.top)  / sr.height) * 100;
        const exB = ((hr.bottom + pad - sr.top)  / sr.height) * 100;

        function overlaps(x, y) {
            return x >= exL && x <= exR && y >= exT && y <= exB;
        }

        for (let i = 0; i < 200; i++) {
            let x, y, attempts = 0;
            do {
                x = Math.random() * 100;
                y = Math.random() * 100;
            } while (overlaps(x, y) && ++attempts < 25);

            const s         = document.createElement('div');
            s.className     = 'star';
            s.style.left    = x + '%';
            s.style.top     = y + '%';
            const size      = Math.random() < 0.8 ? 1 : (Math.random() < 0.6 ? 2 : 3);
            s.style.width   = s.style.height = size + 'px';
            s.style.opacity = (0.2 + Math.random() * 0.75).toFixed(2);
            const r = Math.random();
            if      (r < 0.07) s.style.background = '#ffeebb';
            else if (r < 0.14) s.style.background = '#cce0ff';
            field.appendChild(s);
        }
    });
    </script>
</body>
